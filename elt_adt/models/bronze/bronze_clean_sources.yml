version: 2
sources:
  - name: etl_adt
    database: dbt_core
    schema: default
    tables:
      - name: bronze_data
        description: "This table contains the raw data ingested from an Excel spreadsheet. Be careful because it cotains unconsistent datatypes and values to many fields."
        columns:
          columns:
            - name: index
              description: "The unique identifier for each record."
              data_tests:
                - not_null
                - unique
            - name: Fiebre
              description: "Indicates whether the person has a fever."
            - name: Edad
              description: "The age of the person."
              data_tests:
                - not_null
            - name: Fumador
              description: "Indicates whether the person is a smoker."
            - name: Bebedor
              description: "Indicates whether the person is a drinker."
            - name: Genero
              description: "This field indicates the patient's sex"
              data_tests:
                - not_null
                - accepted_values:
                    values: ['M', 'F']
            - name: "Procedimiento Quirurgicos / Traumatismo Grave en los últimos 15 dias"
              description: "Indicates whether the person has had a surgical procedure or trauma."
            - name: "Inmovilidad de M inferiores"
              description: "Indicates whether the person has immobility in the lower limbs."
            - name: "Viaje prolongado"
              description: "Indicates whether the person has had a prolonged trip."
            - name: "TEP - TVP Previo"
              description: "Indicates whether the person has had a previous pulmonary embolism or deep vein thrombosis."
            - name: Malignidad
              description: "Indicates whether the person has a malignancy."
            - name: Disnea
              description: "Indicates whether the person has dyspnea."
            - name: "Dolor toracico"
              description: "Indicates whether the person has chest pain."
            - name: Tos
              description: "Indicates whether the person has a cough."
            - name: Hemoptisis
              description: "Indicates whether the person has hemoptysis."
            - name: "Síntomas disautonomicos"
              description: "Indicates whether the person has dysautonomic symptoms."
            - name: "Edema de M inferiores"
              description: "Indicates whether the person has edema in the lower limbs."
            - name: Crepitaciones
              description: "Indicates whether the person has crepitations."
            - name: Sibilancias
              description: "Indicates whether the person has wheezing."
            - name: Soplos
              description: "Indicates whether the person has murmurs."
            - name: Derrame
              description: "Indicates whether the person has a pleural effusion."
            - name: Fiebre
              description: "Indicates whether the person has a temperature upper than 38ºC."
            - name: "Frecuencia respiratoria"
              description: "The respiratory rate of the person."
            - name: "Saturación de la sangre"
              description: "The blood oxygen saturation of the person."
            - name: "Frecuencia cardíaca"
              description: "The heart rate of the person."
            - name: "Presión sistólica"
              description: "The systolic blood pressure of the person."
            - name: "Presión diastólica"
              description: "The diastolic blood pressure of the person."
            - name: Hematologica
              description: "Indicates whether the person has a hematological disease."
            - name: "Cardíaca"
              description: "Indicates whether the person has a cardiac disease."
            - name: Endocrina
              description: "Indicates whether the person has an endocrine disease."
            - name: Gastrointestinal
              description: "Indicates whether the person has a gastrointestinal disease."
            - name: "Hepatopatía Crónica"
              description: "Indicates whether the person has a chronic liver disease."
            - name: "Neurológica"
              description: "Indicates whether the person has a neurological disease."
            - name: Pulmonar
              description: "Indicates whether the person has a pulmonary disease."
            - name: Renal
              description: "Indicates whether the person has a renal disease."
            - name: Trombofilia
              description: "Indicates whether the person has a thrombophilia."
            - name: "Urológica"
              description: "Indicates whether the person has a urological disease."
            - name: Vascular
              description: "Indicates whether the person has a vascular disease."
            - name: VIH
              description: "Indicates whether the person has HIV."
            - name: "Diabetes Mellitus"
              description: "Indicates whether the person has diabetes mellitus."
            - name: "Enfermedad coronaria"
              description: "Indicates whether the person has coronary artery disease."
            - name: "Hipertensión arterial"
              description: "Indicates whether the person has arterial hypertension."
            - name: TEP
              description: "Indicates whether the person has a pulmonary embolism."
              data_tests:
                - accepted_values:
                    values: [1,0]